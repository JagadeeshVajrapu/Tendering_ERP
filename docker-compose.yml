version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: tender-erp-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: tender-erp

  redis:
    image: redis:7-alpine
    container_name: tender-erp-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  mongodb_data:
  redis_data: